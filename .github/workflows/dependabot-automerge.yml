name: Auto-merge Dependabot PRs

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  automerge:
    name: Merge qualifying Dependabot PRs
    runs-on: ubuntu-latest
    steps:
      - name: Fetch HA package constraints
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/home-assistant/core/dev/homeassistant/package_constraints.txt" \
            -o /tmp/ha_constraints.txt
          echo "=== HA constraints for our runtime deps ==="
          grep -iE "^(bleak|pydantic)" /tmp/ha_constraints.txt || echo "(none found)"

      - name: Merge qualifying PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Returns 0 (allow merge) if bumping pkg to new_ver does not exceed HA's pinned version.
          # Packages not mentioned in HA constraints (dev tools, etc.) are always allowed.
          version_ok() {
            local pkg="$1" new_ver="$2"
            # Normalise separator so bleak-retry-connector matches bleak_retry_connector
            local pkg_pattern
            pkg_pattern=$(echo "$pkg" | sed 's/[-_]/[-_]/g')
            local ha_line
            ha_line=$(grep -iE "^${pkg_pattern}[>=<!]" /tmp/ha_constraints.txt 2>/dev/null | head -1 || true)

            if [ -z "$ha_line" ]; then
              echo "  $pkg not constrained by HA — allowed"
              return 0
            fi

            echo "  HA constraint: $ha_line"
            python3 - "$ha_line" "$new_ver" <<'PYEOF'
          import sys, re
          from packaging.version import Version

          ha_line, new_ver = sys.argv[1], sys.argv[2]
          new = Version(new_ver)
          spec_str = re.sub(r'^[\w\-_.]+', '', ha_line).strip()

          # Walk each specifier clause and enforce upper bounds
          upper_ok = True
          for part in spec_str.split(','):
              part = part.strip()
              if part.startswith('=='):
                  if new > Version(part[2:]):
                      upper_ok = False
              elif part.startswith('<='):
                  if new > Version(part[2:]):
                      upper_ok = False
              elif part.startswith('<'):
                  if new >= Version(part[1:]):
                      upper_ok = False
              # >= and > are lower bounds only — no upper limit imposed

          sys.exit(0 if upper_ok else 1)
          PYEOF
          }

          prs=$(gh pr list \
            --author "app/dependabot" \
            --state open \
            --json number,title,headRefOid,mergeStateStatus,labels \
            --repo "$REPO")

          echo "Open Dependabot PRs: $(echo "$prs" | jq 'length')"

          echo "$prs" | jq -c '.[]' | while read -r pr; do
            number=$(echo "$pr"      | jq -r '.number')
            title=$(echo "$pr"       | jq -r '.title')
            sha=$(echo "$pr"         | jq -r '.headRefOid')
            merge_state=$(echo "$pr" | jq -r '.mergeStateStatus')

            echo ""
            echo "=== PR #$number: $title"

            if [ "$merge_state" = "DIRTY" ]; then
              echo "  SKIP: merge conflict"
              continue
            fi

            is_security=$(echo "$pr" | jq '[.labels[].name] | any(. == "security")')

            # All PRs (security or not) must respect HA's version ceiling.
            # Only handle single-package bumps: "Bump <pkg> from <old> to <new>"
            if echo "$title" | grep -qiE "^Bump [^ ]+ from [^ ]+ to [^ ]+$"; then
              pkg=$(echo "$title"     | awk '{print $2}')
              new_ver=$(echo "$title" | awk '{print $6}')
              label=""
              [ "$is_security" = "true" ] && label=" (security)"
              echo "  Package bump$label: $pkg → $new_ver"
              if ! version_ok "$pkg" "$new_ver"; then
                echo "  SKIP: $new_ver exceeds HA's pinned version"
                continue
              fi
            else
              # Group / multi-package bumps need manual review regardless of security label.
              echo "  SKIP: group bump — needs manual review"
              continue
            fi

            # Check CI status for the PR head commit
            check_runs=$(gh api "repos/$REPO/commits/$sha/check-runs" --paginate \
              --jq '[.check_runs[] | select(.name != "Merge qualifying Dependabot PRs")]')

            total=$(echo "$check_runs"   | jq 'length')
            pending=$(echo "$check_runs" | jq '[.[] | select(.status != "completed")] | length')
            failed=$(echo "$check_runs"  | jq '[.[] | select(
              .status == "completed" and
              (.conclusion | IN("success","skipped","neutral") | not)
            )] | length')

            if [ "$total" -eq 0 ]; then
              echo "  SKIP: no CI checks found"
              continue
            fi
            if [ "$pending" -gt 0 ]; then
              echo "  SKIP: $pending check(s) still running"
              continue
            fi
            if [ "$failed" -gt 0 ]; then
              echo "  SKIP: $failed check(s) failed"
              continue
            fi

            echo "  All $total check(s) passed — merging"
            gh pr merge "$number" --squash --delete-branch --repo "$REPO"
          done
